name: Build & Release PrintFlow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: npm run react-build
      - run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: npm run react-build
      - name: Build Windows EXE (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: npm run react-build
      - run: npx electron-builder --linux --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 7

  publish:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: ./dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./dist

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./dist

      - name: Get version
        id: ver
        run: echo "VERSION=$(node -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to NAS
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          echo -e "Host *\n  StrictHostKeyChecking no\n  BatchMode yes" > ~/.ssh/config

          NAS="admin@100.68.105.76"
          SSH="ssh -i ~/.ssh/nas_key"

          DMG=$(ls ./dist/*.dmg 2>/dev/null | head -1)
          EXE=$(ls ./dist/*.exe 2>/dev/null | head -1)
          APPIMAGE=$(ls ./dist/*.AppImage 2>/dev/null | head -1)

          if [ -n "$DMG" ]; then
            echo "Uploading Mac DMG..."
            cat "$DMG" | $SSH $NAS "cat > /volume1/printflow1/data/updates/PrintFlow-${VERSION}-mac.dmg"
          fi

          if [ -n "$EXE" ]; then
            echo "Uploading Windows EXE..."
            cat "$EXE" | $SSH $NAS "cat > /volume1/printflow1/data/updates/PrintFlow-${VERSION}-win.exe"
          fi

          if [ -n "$APPIMAGE" ]; then
            echo "Uploading Linux AppImage..."
            cat "$APPIMAGE" | $SSH $NAS "cat > /volume1/printflow1/data/updates/PrintFlow-${VERSION}-linux.AppImage"
          fi

          echo "Writing manifest..."
          PUBLISHED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          $SSH $NAS "cat > /volume1/printflow1/data/updates/latest.json" << EOF
          {
            "version": "${VERSION}",
            "publishedAt": "${PUBLISHED}",
            "releaseNotes": "See the Changelog tab in the app for full details.",
            "macUrl": "http://10.0.0.219:3001/updates/PrintFlow-${VERSION}-mac.dmg",
            "winUrl": "http://10.0.0.219:3001/updates/PrintFlow-${VERSION}-win.exe",
            "linuxUrl": "http://10.0.0.219:3001/updates/PrintFlow-${VERSION}-linux.AppImage",
            "macUrlRemote": "http://100.68.105.76:3001/updates/PrintFlow-${VERSION}-mac.dmg",
            "winUrlRemote": "http://100.68.105.76:3001/updates/PrintFlow-${VERSION}-win.exe",
            "linuxUrlRemote": "http://100.68.105.76:3001/updates/PrintFlow-${VERSION}-linux.AppImage"
          }
          EOF

          echo "Done - PrintFlow v${VERSION} published to NAS"
