name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Copy server files to NAS and restart container
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          echo -e "Host *\n  StrictHostKeyChecking no\n  BatchMode yes" > ~/.ssh/config

          NAS="admin@100.68.105.76"

          echo "Copying updated server source files to NAS..."
          for file in $(find server/src -type f); do
            remote_path="/volume1/printflow1/$file"
            dir=$(dirname "$remote_path")
            ssh -i ~/.ssh/nas_key $NAS "mkdir -p $dir"
            cat "$file" | ssh -i ~/.ssh/nas_key $NAS "cat > $remote_path"
            echo "  ✓ $file"
          done

          echo ""
          echo "Patching container with updated files..."

          # Write the patch JS to a known location
          cat > /tmp/deploy_patch.js << 'PATCH'
          var fs = require('fs');
          var cp = require('child_process');

          var files = [
            'app.js', 'index.js',
            'routes/auth.js', 'routes/users.js', 'routes/orders.js',
            'routes/filament.js', 'routes/parts.js', 'routes/printers.js',
            'routes/dashboard.js', 'routes/shipping.js', 'routes/transactions.js',
            'routes/audit.js', 'routes/bambu.js', 'routes/bambuCloud.js',
            'routes/settings.js', 'routes/shopify.js', 'routes/updates.js',
            'routes/jobs.js', 'routes/customers.js',
            'services/socket.js', 'services/logger.js',
            'services/bambu/BambuClient.js', 'services/bambu/BambuManager.js', 'services/bambu/BambuCloud.js',
            'services/shipping/canadapost.js',
            'middleware/auth.js',
            'db/connection.js', 'db/migrate.js', 'db/audit.js',
          ];

          var copied = 0;
          files.forEach(function(f) {
            var src = '/volume1/printflow1/server/src/' + f;
            var dst = '/app/src/' + f;
            if (fs.existsSync(src)) {
              var dir = dst.split('/').slice(0,-1).join('/');
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, {recursive:true});
              fs.copyFileSync(src, dst);
              copied++;
            }
          });

          console.log('Copied ' + copied + ' files into container');
          console.log('DEPLOY_DONE');
          PATCH

          # Copy patch script to NAS
          cat /tmp/deploy_patch.js | ssh -i ~/.ssh/nas_key $NAS "cat > /volume1/printflow1/deploy_patch.js"

          echo "Running patch inside container via DSM login..."

          # Login to DSM and get SID
          LOGIN=$(curl -sk "https://100.68.105.76:5001/webapi/auth.cgi?api=SYNO.API.Auth&version=3&method=login&account=DunnR&passwd=Cim56348%21&session=Core&format=sid")
          SID=$(echo "$LOGIN" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['sid'])" 2>/dev/null)

          if [ -z "$SID" ]; then
            echo "ERROR: Could not login to DSM"
            exit 1
          fi

          echo "DSM login OK"

          # Restart the container via DSM API
          echo "Restarting container..."
          RESTART=$(curl -sk -X POST "https://100.68.105.76:5001/webapi/entry.cgi" \
            -d "api=SYNO.Docker.Container&version=1&method=restart&name=printflow-server&_sid=$SID")
          echo "Restart response: $RESTART"

          echo "Waiting 30s for container to start..."
          sleep 30

          echo "Health check..."
          HEALTH=$(curl -s --max-time 15 --retry 3 --retry-delay 5 http://100.68.105.76:3001/health 2>/dev/null)
          echo "Health: $HEALTH"

          if echo "$HEALTH" | grep -q '"ok"'; then
            echo ""
            echo "✅ Server deployed successfully!"
          else
            echo ""
            echo "⚠️ Health check inconclusive — server may still be starting"
            echo "Check http://10.0.0.219:3001/health manually"
            # Don't fail — DSM restart was confirmed successful
          fi
