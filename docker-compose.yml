# PrintFlow Server — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#   3. Open http://localhost:3001/health to verify
#
# Update to latest version:
#   docker compose pull && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  printflow:
    image: ghcr.io/rbd992/printflow-server:latest
    container_name: printflow-server
    restart: unless-stopped

    ports:
      - "${SERVER_PORT:-3001}:3001"

    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}

    volumes:
      # Persistent data (database, update files)
      - printflow-data:/app/data
      # Persistent logs
      - printflow-logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3

    # Required for camera streaming (H2C/X1C use RTSPS via ffmpeg)
    # The printer must be reachable from the host network
    network_mode: host   # simplest option — exposes port directly on host

volumes:
  printflow-data:
    driver: local
  printflow-logs:
    driver: local
